<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Catálogo Pastel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-container">
        <div class="blob orange"></div>
        <div class="blob purple"></div>
        <div class="blob blue"></div>
    </div>

    <div class="bento-grid">
        <div class="card card-large">
            <h1 class="logo-text">DELI<span>KUSH</span></h1>
            <p class="slogan">BUENOS AIRES • 2026</p>
        </div>

        <div class="card card-standard" onclick="pedir('Boxy Fit', '$22.500')">
            <div class="visual">👕</div>
            <h3>BOXY FIT</h3>
            <p class="price">$22.500</p>
        </div>

        <div class="card card-tall" onclick="pedir('Heavy Hoodie', '$45.000')">
            <div class="visual" style="font-size: 8rem;">🧥</div>
            <h3>HEAVY HOODIE</h3>
            <p class="price">$45.000</p>
        </div>

        <div class="card card-wide whatsapp" onclick="window.open('https://wa.me/541156584277')">
            <h3>PEDIR POR WHATSAPP 🔥</h3>
        </div>

        <div class="card card-standard" onclick="pedir('Baggy Cargo', '$38.900')">
            <div class="visual">👖</div>
            <h3>BAGGY CARGO</h3>
            <p class="price">$38.900</p>
        </div>

        <div class="card card-standard" onclick="pedir('Short Oversize', '$18.500')">
            <div class="visual">🩳</div>
            <h3>OVERSHORT</h3>
            <p class="price">$18.500</p>
        </div>

        <div class="card card-standard" onclick="pedir('Trucker Cap', '$12.000')">
            <div class="visual">🧢</div>
            <h3>TRUCKER CAP</h3>
            <p class="price">$12.000</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
