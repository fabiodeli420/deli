<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Streetwear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="logo" id="logo">DELI<span style="color:#ff6b35">KUSH</span></div>
    </nav>
    
    <section class="hero">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <h1>STREETWEAR<br><span class="line2">DELIKUSH</span></h1>
        <p style="letter-spacing:8px; color:#666; margin-top:20px; font-weight: bold;">DROP 2026</p>
    </section>

    <div class="grid">
        <div class="card">
            <div class="img-p">👖</div>
            <h3>JOGGER KANJI</h3>
            <p class="price">$39.900</p>
            <button class="btn" onclick="pedir('Jogger Kanji', '$39.900')">PEDIR AHORA</button>
        </div>
        <div class="card">
            <div class="img-p">👕</div>
            <h3>KNIT TEE SAND</h3>
            <p class="price">$32.500</p>
            <button class="btn" onclick="pedir('Knit Tee Sand', '$32.500')">PEDIR AHORA</button>
        </div>
    </div>

    <footer class="footer">
        <a href="https://www.instagram.com/deli.kush/" target="_blank" class="social-link">
            <i class="fab fa-instagram"></i>
        </a>
        <p style="margin-top: 20px; color: #333;">&copy; 2026 DELIKUSH BRAND</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
