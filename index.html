<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Premium Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --accent: #ff6b35; 
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- FONDO ANIMADO PRO --- */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #080808;
            overflow: hidden;
        }

        /* Esferas de luz que se mueven */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            right: -100px;
            top: -100px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            animation-duration: 15s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Textura de "Ruido" para que no sea liso */
        .bg-gradient::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* --- BENTO GRID --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 160px;
            gap: 15px;
            max-width: 900px;
            width: 100%;
            z-index: 1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255, 107, 53, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        /* BENTO SIZES */
        .card-large { grid-column: span 2; grid-row: span 2; }
        .card-tall { grid-column: span 1; grid-row: span 2; }
        .card-wide { grid-column: span 2; grid-row: span 1; }
        .card-square { grid-column: span 1; grid-row: span 1; }

        /* CONTENT */
        .logo-text { font-family: 'Bebas Neue'; font-size: 5rem; line-height: 1; letter-spacing: 2px; }
        .logo-text span { color: var(--accent); text-shadow: 0 0 20px rgba(255, 107, 53, 0.4); }
        .slogan { font-size: 0.8rem; font-weight: 700; opacity: 0.5; letter-spacing: 5px; margin-top: 10px; }

        .dk-visual { 
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.4), rgba(168, 85, 247, 0.4)); 
            border: none;
            display: grid; place-items: center;
        }
        .dk-inner { font-family: 'Bebas Neue'; font-size: 8rem; opacity: 0.3; animation: float 4s infinite ease-in-out; }

        .price-tag { background: var(--accent); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.9rem; font-weight: 900; width: fit-content; margin-top: 15px; }
        .product-icon { font-size: 4.5rem; margin-bottom: 10px; }
        h3 { font-family: 'Bebas Neue'; font-size: 1.8rem; margin-bottom: 5px; }

        .wa-btn { background: #25d366; color: white; border: none; flex-direction: row; gap: 15px; align-items: center; font-weight: 900; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: auto; }
            .card-large, .card-wide, .card-tall, .card-square { grid-column: span 2; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="bento-grid">
        <div class="card card-large">
            <h1 class="logo-text">DELI<span>KUSH</span></h1>
            <p class="slogan">STREETWEAR • 2026</p>
        </div>

        <div class="card card-tall dk-visual">
            <div class="dk-inner">DK</div>
        </div>

        <div class="card card-tall" onclick="pedir('Boxy Fit Tee', '$22.500')">
            <div class="product-icon">👕</div>
            <h3>BOXY FIT</h3>
            <div class="price-tag">$22.500</div>
        </div>

        <div class="card card-wide wa-btn" onclick="window.open('https://wa.me/541156584277')">
            <h3>WHATSAPP PEDIDOS 🔥</h3>
        </div>

        <div class="card card-square" onclick="pedir('Hoodie', '$45.000')">
            <div class="product-icon" style="font-size: 2rem;">🧥</div>
            <p style="font-weight: 900;">HOODIE</p>
        </div>

        <div class="card card-square">
            <p style="font-size: 0.7rem; opacity: 0.6;">DROP</p>
            <p style="font-weight: 900;">NEW COLL</p>
        </div>
    </div>

    <script>
        function pedir(producto, precio) {
            const tel = "541156584277";
            const mensaje = encodeURIComponent(`Hola DELIKUSH! 🔥 Quiero info de: ${producto} (${precio})`);
            window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
        }

        // Tilt 3D
        document.querySelectorAll('.card').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (centerY - y) / 10;
                const rotateY = (x - centerX) / 10;
                item.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
            });

            item.addEventListener('mouseleave', () => {
                item.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
            });
        });
    </script>
</body>
</html>
