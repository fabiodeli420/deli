<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Premium Streetwear</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-gradient"></div>

    <main class="bento-container">
        <div class="bento-item profile-card">
            <div class="logo">DELI<span>KUSH</span></div>
            <p>Viste Grande. Vive Libre.</p>
            <div class="badge">DROP 2026 LIVE</div>
        </div>

        <div class="bento-item hero-visual">
            <div class="floating-text">OVERSIZE VIBES</div>
            <div class="dk-symbol">DK</div>
        </div>

        <div class="bento-item shop-card" onclick="location.href='#productos'">
            <h3>CATÁLOGO <i class="fas fa-arrow-right"></i></h3>
            <p>Explora la nueva colección</p>
        </div>

        <div class="bento-item product-featured">
            <span class="tag">HOT</span>
            <div class="img-placeholder">👕</div>
            <h4>Boxy Fit Tee</h4>
            <p>$22.500</p>
        </div>

        <div class="bento-item social-card">
            <a href="https://wa.me/541156584277" class="wa-btn">
                <i class="fab fa-whatsapp"></i> PEDIR POR WHATSAPP
            </a>
        </div>

        <div class="bento-item shipping-card">
            <i class="fas fa-truck"></i>
            <p>Envíos a todo el país 🇦🇷</p>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
