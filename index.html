<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Catálogo Pastel Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-scene">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="bento-grid">
        <div class="card card-large main-logo">
            <h1 class="logo-text">DELI<span>KUSH</span></h1>
            <p class="slogan">EST. 2026 • BUENOS AIRES</p>
        </div>

        <div class="card card-standard item" onclick="enviarPedido('Boxy Fit Tee', '$22.500')">
            <div class="visual">👕</div>
            <div class="info">
                <h3>BOXY FIT TEE</h3>
                <p class="price">$22.500</p>
            </div>
        </div>

        <div class="card card-tall item" onclick="enviarPedido('Heavy Hoodie', '$45.000')">
            <div class="visual large">🧥</div>
            <div class="info">
                <h3>HEAVY HOODIE</h3>
                <p>420 GSM Premium</p>
                <p class="price">$45.000</p>
            </div>
        </div>

        <div class="card card-wide wa-card" onclick="window.open('https://wa.me/541156584277')">
            <h3>WHATSAPP PEDIDOS 🔥</h3>
        </div>

        <div class="card card-standard item" onclick="enviarPedido('Baggy Cargo', '$38.900')">
            <div class="visual">👖</div>
            <div class="info">
                <h3>BAGGY CARGO</h3>
                <p class="price">$38.900</p>
            </div>
        </div>

        <div class="card card-standard item" onclick="enviarPedido('Short Oversize', '$18.500')">
            <div class="visual">🩳</div>
            <div class="info">
                <h3>OVERSHORT</h3>
                <p class="price">$18.500</p>
            </div>
        </div>

        <div class="card card-standard item" onclick="enviarPedido('Trucker Cap', '$12.000')">
            <div class="visual">Cap</div>
            <div class="info">
                <h3>TRUCKER CAP</h3>
                <p class="price">$12.000</p>
            </div>
        </div>

        <div class="card card-large combo-card" onclick="enviarPedido('Combo Full DK', '$75.000')">
            <h3>COMBO DK</h3>
            <p>Hoodie + Baggy + Cap</p>
            <p class="price">$75.000</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
