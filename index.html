<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div class="bento-wrapper">
        <header class="header-main">
            <h1 class="logo">DELI<span>KUSH</span></h1>
        </header>

        <div class="grid-layout">
            <div class="card card-big">
                <span class="mini-tag">DROP 2026</span>
                <h2>VISTE<br><span>GRANDE</span></h2>
                <p>Oversize Culture.</p>
            </div>

            <div class="card card-visual">
                <div class="dk-float">DK</div>
            </div>

            <div class="card card-item">
                <div class="icon">👕</div>
                <h3>Boxy Fit</h3>
                <p class="price">$22.500</p>
                <button class="btn-wa" onclick="pedir('Boxy Fit')">PEDIR</button>
            </div>

            <div class="card card-item">
                <div class="icon">🧥</div>
                <h3>Hoodie</h3>
                <p class="price">$45.000</p>
                <button class="btn-wa" onclick="pedir('Hoodie Heavy')">PEDIR</button>
            </div>

            <div class="card card-wide" onclick="window.open('https://wa.me/541156584277')">
                <i class="fab fa-whatsapp"></i>
                <div>
                    <h3>WHATSAPP DIRECTO</h3>
                    <p>Consultá por talles y stock</p>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
