<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Premium Streetwear</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-blur"></div>

    <div class="container">
        <header class="main-header">
            <div class="logo">DELI<span>KUSH</span></div>
            <p class="tagline">VISTE GRANDE. VIVE LIBRE.</p>
        </header>

        <main class="bento-grid">
            <div class="bento-item card-welcome">
                <span class="badge">NUEVO DROP</span>
                <h2>LA CULTURA <br><span>OVERSIZE</span></h2>
                <p>Calidad premium para el daily wear.</p>
            </div>

            <div class="bento-item card-visual">
                <div class="dk-inner">DK</div>
                <div class="floating-label">ORIGINAL BRAND</div>
            </div>

            <div class="bento-item card-product">
                <div class="prod-img">👕</div>
                <div class="prod-info">
                    <h3>Boxy Fit Tee</h3>
                    <p class="price">$22.500</p>
                    <button onclick="pedir('Boxy Fit Tee', '$22.500')">PEDIR</button>
                </div>
            </div>

            <div class="bento-item card-product">
                <div class="prod-img">🧥</div>
                <div class="prod-info">
                    <h3>Heavy Hoodie</h3>
                    <p class="price">$45.000</p>
                    <button onclick="pedir('Heavy Hoodie', '$45.000')">PEDIR</button>
                </div>
            </div>

            <div class="bento-item card-social" onclick="window.open('https://wa.me/541156584277')">
                <i class="fab fa-whatsapp"></i>
                <h3>HACÉ TU PEDIDO</h3>
                <p>Atención personalizada</p>
            </div>

            <div class="bento-item card-info">
                <i class="fas fa-truck-fast"></i>
                <p>Envíos a todo el país 🇦🇷</p>
            </div>
        </main>

        <footer class="main-footer">
            <p>© 2026 DELIKUSH - Buenos Aires</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
