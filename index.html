<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Oversize Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">DELI<span>KUSH</span></a>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#coleccion">Colección</a></li>
                <li><a href="#pedidos">Pedidos</a></li>
            </ul>
        </div>
    </nav>

    <section id="inicio" class="hero">
        <div class="hero-content">
            <h1>VESTÍ GRANDE.<br>VIVÍ LIBRE.</h1>
            <p>Streetwear con identidad urbana. DELIKUSH es actitud y comodidad premium.</p>
            <a href="#coleccion" class="btn-main">VER COLECCIÓN</a>
        </div>
    </section>

    <section id="coleccion" class="productos">
        <h2 class="section-title">Nuestra Colección</h2>
        <div class="grid">
            <div class="card">
                <div class="card-img" style="background: var(--fire);">👕</div>
                <h3>Remera Oversize</h3>
                <p>Algodón premium, talle real.</p>
                <button onclick="pedirProducto('Remera Oversize')">Pedir por WhatsApp</button>
            </div>
            <div class="card">
                <div class="card-img" style="background: var(--purple);">🧥</div>
                <h3>Buzo Hoodie</h3>
                <p>Máximo estilo y abrigo.</p>
                <button onclick="pedirProducto('Buzo Hoodie')">Pedir por WhatsApp</button>
            </div>
        </div>
    </section>

    <section id="pedidos" class="form-section">
        <h2>Hacé tu pedido</h2>
        <form id="pedidoForm" onsubmit="enviarPedido(event)">
            <input type="text" id="nombre" placeholder="Tu Nombre" required>
            <select id="prenda" required>
                <option value="">Elegí prenda...</option>
                <option value="Remera Oversize">Remera Oversize</option>
                <option value="Buzo Hoodie">Buzo Hoodie</option>
            </select>
            <button type="submit" class="btn-enviar">Enviar a WhatsApp</button>
        </form>
    </section>

    <script src="./main.js"></script>
</body>
</html>
