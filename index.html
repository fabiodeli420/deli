<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Premium Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ff6b35; /* El naranja de tu logo */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Fondo con profundidad */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 107, 53, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }

        /* Rejilla BENTO real (como el link) */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 160px;
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* EFECTO HOVER PRO */
        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 107, 53, 0.1);
            background: rgba(255, 255, 255, 0.06);
        }

        /* CONFIGURACIÓN DE TAMAÑOS (Bento Style) */
        .card-large { grid-column: span 2; grid-row: span 2; } /* Caja principal */
        .card-tall { grid-column: span 1; grid-row: span 2; }  /* Caja de producto larga */
        .card-wide { grid-column: span 2; grid-row: span 1; }  /* Caja de WhatsApp */
        .card-square { grid-column: span 1; grid-row: span 1; }

        /* CONTENIDO ESPECÍFICO */
        .logo-text { font-family: 'Bebas Neue'; font-size: 5rem; line-height: 1; letter-spacing: 2px; }
        .logo-text span { color: var(--accent); text-shadow: 0 0 20px rgba(255, 107, 53, 0.4); }
        
        .slogan { font-size: 0.9rem; font-weight: 700; opacity: 0.5; letter-spacing: 4px; margin-top: 10px; }

        .dk-visual { 
            background: linear-gradient(135deg, #ff6b35, #a855f7); 
            border: none;
            display: grid; place-items: center;
        }
        .dk-inner { font-family: 'Bebas Neue'; font-size: 8rem; opacity: 0.2; animation: float 4s infinite ease-in-out; }

        .price-tag { background: var(--accent); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 900; width: fit-content; margin-top: 10px; }
        
        .product-icon { font-size: 4rem; margin-bottom: 15px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
        
        h3 { font-family: 'Bebas Neue'; font-size: 1.8rem; margin-bottom: 5px; }

        .wa-btn { background: #25d366; color: white; border: none; flex-direction: row; gap: 15px; align-items: center; }
        .wa-btn h3 { margin: 0; font-size: 1.4rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* RESPONSIVE (Móvil) */
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 150px; }
            .card-large, .card-wide, .card-tall { grid-column: span 2; }
            .card-square { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="card card-large">
            <h1 class="logo-text">DELI<span>KUSH</span></h1>
            <p class="slogan">BUENOS AIRES • 2026</p>
        </div>

        <div class="card card-tall dk-visual">
            <div class="dk-inner">DK</div>
        </div>

        <div class="card card-tall" onclick="pedir('Boxy Fit Tee', '$22.500')">
            <div class="product-icon">👕</div>
            <h3>BOXY FIT</h3>
            <p>Heavy Cotton 100%</p>
            <div class="price-tag">$22.500</div>
        </div>

        <div class="card card-wide wa-btn" onclick="window.open('https://wa.me/541156584277')">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.179-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.747-2.874-2.512-2.96-2.626-.087-.115-.708-.941-.708-1.793 0-.852.449-1.27.608-1.436.158-.166.346-.209.461-.209.115 0 .23 0 .331.005.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.115-.087.188-.173.289l-.26.304c-.087.101-.177.211-.077.383.1.173.444.731.953 1.185.656.584 1.209.765 1.382.852.173.087.274.072.375-.043.101-.115.433-.505.548-.678.115-.173.231-.144.39-.087.158.058 1.011.477 1.184.563.173.087.289.129.331.202.043.073.043.419-.101.824z"/></svg>
            <h3>PEDIR POR WHATSAPP</h3>
        </div>

        <div class="card card-square" onclick="pedir('Hoodie', '$45.000')">
            <div class="product-icon" style="font-size: 2.5rem;">🧥</div>
            <p style="font-weight: 900; font-size: 0.8rem;">HOODIE</p>
        </div>

        <div class="card card-square">
            <p style="font-size: 0.7rem; opacity: 0.5;">ENVÍOS</p>
            <p style="font-weight: 900;">🇦🇷 TODO EL PAÍS</p>
        </div>
    </div>

    <script>
        // Función de pedido
        function pedir(producto, precio) {
            const tel = "541156584277";
            const mensaje = encodeURIComponent(`¡Hola DELIKUSH! 🔥 Me interesa: ${producto} (${precio})`);
            window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
        }

        // EFECTO TILT 3D (Como el link de Genspark)
        document.querySelectorAll('.card').forEach(item => {
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Rotación dinámica
                const rotateX = (centerY - y) / 12;
                const rotateY = (x - centerX) / 12;
                
                item.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
            });

            item.addEventListener('mouseleave', () => {
                item.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
            });
        });
    </script>
</body>
</html>
