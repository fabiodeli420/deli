<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | Streetwear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff6b35; --s: #a855f7; --d: #050508; --t: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--d); color: var(--t); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* Navbar */
        .nav { height: 80px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #222; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; z-index: 100; }
        .logo { font-family: 'Bebas Neue'; font-size: 2.5rem; letter-spacing: 2px; cursor: pointer; }
        
        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .hero h1 { font-family: 'Bebas Neue'; font-size: clamp(4rem, 12vw, 8rem); line-height: 0.9; z-index: 2; }
        .line2 { color: var(--p); text-shadow: 0 0 30px rgba(255,107,53,0.4); }
        
        /* Shapes de fondo (Movimiento) */
        .shape { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: 1; transition: transform 0.1s ease-out; }
        .shape1 { background: var(--p); top: 10%; right: 10%; }
        .shape2 { background: var(--s); bottom: 10%; left: 10%; }

        /* Grid de Productos */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 100px 20px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }
        .card { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-15px); border-color: var(--p); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* Placeholders de fotos */
        .img-p { height: 300px; background: linear-gradient(135deg, #111, #000); border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 5rem; border: 1px solid #222; }
        
        /* Botones y Texto */
        .price { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--p); margin: 15px 0; }
        .btn { background: var(--p); color: #fff; padding: 18px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; border: none; cursor: pointer; width: 100%; transition: 0.3s; font-size: 1rem; }
        .btn:hover { background: #fff; color: #000; transform: scale(1.02); }

        /* Footer minimalista SOLO IG */
        .footer { padding: 100px 20px; text-align: center; border-top: 1px solid #222; position: relative; z-index: 2; }
        .social-link { font-size: 3rem; color: #555; transition: 0.4s; text-decoration: none; }
        .social-link:hover { color: #fff; transform: translateY(-5px) scale(1.1); filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
        .p-footer { margin-top: 30px; font-size: 0.8rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav class="nav"><div class="logo" id="logo">DELI<span style="color:var(--p)">KUSH</span></div></nav>
    
    <section class="hero">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <h1>STREETWEAR<br><span class="line2">DELIKUSH</span></h1>
        <p style="letter-spacing:8px; color:#666; margin-top:20px; font-weight: bold;">DROP 2026</p>
    </section>

    <div class="grid">
        <div class="card">
            <div class="img-p">👖</div>
            <h3>JOGGER KANJI</h3>
            <p class="price">$39.900</p>
            <button class="btn" onclick="pedir('Jogger Kanji', '$39.900')"><i class="fab fa-whatsapp"></i> PEDIR AHORA</button>
        </div>
        <div class="card">
            <div class="img-p">👕</div>
            <h3>KNIT TEE SAND</h3>
            <p class="price">$32.500</p>
            <button class="btn" onclick="pedir('Knit Tee Sand', '$32.500')"><i class="fab fa-whatsapp"></i> PEDIR AHORA</button>
        </div>
        <div class="card">
            <div class="img-p">🧥</div>
            <h3>HOODIE FLAME</h3>
            <p class="price">$42.000</p>
            <button class="btn" onclick="pedir('Hoodie Flame', '$42.000')"><i class="fab fa-whatsapp"></i> PEDIR AHORA</button>
        </div>
    </div>

    <footer class="footer">
        <div style="margin-bottom: 25px; color: #333; font-weight: bold; letter-spacing: 3px; font-size: 0.9rem;">CONECTÁ CON NOSOTROS</div>
        <a href="https://www.instagram.com/deli.kush/" target="_blank" class="social-link" title="Instagram Official"><i class="fab fa-instagram"></i></a>
        <p class="p-footer">&copy; 2026 DELIKUSH BRAND / FLOW SIN LÍMITES</p>
    </footer>

    <script>
        function pedir(n, p) {
            const m = encodeURIComponent(`¡Hola DELIKUSH! 🔥\nMe interesa el producto: ${n}\nPrecio: ${p}`);
            window.open(`https://wa.me/541156584277?text=${m}`, '_blank');
        }

        document.addEventListener('mousemove', (e) => {
            const s1 = document.querySelector('.shape1');
            const s2 = document.querySelector('.shape2');
            if(s1 && s2) {
                const x = (e.clientX / window.innerWidth - 0.5) * 60;
                const y = (e.clientY / window.innerHeight - 0.5) * 60;
                s1.style.transform = `translate(${x}px, ${y}px)`;
                s2.style.transform = `translate(${-x}px, ${-y}px)`;
            }
        });

        let clicks = 0;
        document.getElementById('logo').onclick = () => {
            clicks++;
            if(clicks === 5) {
                document.body.style.filter = 'hue-rotate(150deg) contrast(1.2)';
                setTimeout(() => { document.body.style.filter = 'none'; clicks = 0; }, 4000);
            }
        };
    </script>
</body>
</html>
