<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELIKUSH | 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bento-container">
        <div class="bento-item card-logo">
            <h1 class="logo">DELI<span>KUSH</span></h1>
            <p>VISTE GRANDE</p>
        </div>

        <div class="bento-item card-visual">
            <div class="dk-symbol">DK</div>
        </div>

        <div class="bento-item card-product" onclick="pedir('Boxy Fit')">
            <span class="emoji">👕</span>
            <p>BOXY FIT</p>
            <p class="price">$22.500</p>
        </div>

        <div class="bento-item card-product" onclick="pedir('Hoodie')">
            <span class="emoji">🧥</span>
            <p>HOODIE</p>
            <p class="price">$45.000</p>
        </div>

        <div class="bento-item card-wa" onclick="window.open('https://wa.me/541156584277')">
            <h3>WHATSAPP 🔥</h3>
            <p>PEDIR AHORA</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
